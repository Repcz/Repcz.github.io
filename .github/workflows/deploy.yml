# Name: Deploy MkDocs to GitHub Pages
#
# 构建 MkDocs Material 文档站点并部署到 GitHub Pages
#
# 触发条件:
#   - push 到 X 分支 (构建 + 部署)
#   - PR 到 X 分支 (仅构建，不部署)
#
# 环境要求:
#   - GitHub Pages 已启用，source 设置为 "GitHub Actions"
#   - 仓库 Settings > Pages > Source = GitHub Actions

name: Deploy MkDocs

on:
  push:
    branches:
      - X
  pull_request:
    branches:
      - X

  # 允许手动触发
  workflow_dispatch:

# 权限: 需要 id-token: write 用于 OIDC 认证
# 以及 pages: write 和 contents: read 用于部署
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制: 同一组内只允许一个部署任务运行
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ============================================================
  # 构建作业
  # ============================================================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build MkDocs site
        run: mkdocs build --strict
        env:
          # 从 actions/configure-pages 获取完整 base URL 并注入为 site_url
          # 确保 MkDocs 生成正确的规范 URL 和资源路径
          SITE_URL: ${{ steps.pages.outputs.base_url }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  # ============================================================
  # 部署作业 (仅 push 到 X 时执行)
  # ============================================================
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/X'
    needs: build
    runs-on: ubuntu-latest

    # 部署环境
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
