# Name: Deploy MkDocs to GitHub Pages & Cloudflare Pages
#
# 构建 MkDocs Material 文档站点并双部署到:
#   - GitHub Pages (doc.repcz.link)
#   - Cloudflare Pages (wiki.repcz.link)
#
# 触发条件:
#   - push 到 X 分支 (构建 + 双部署)
#   - PR 到 X 分支 (仅构建，不部署)
#
# 环境要求:
#   - GitHub Pages 已启用，source 设置为 "GitHub Actions"
#   - Cloudflare Pages 项目已创建 (项目名: repcz-tool)
#   - GitHub Secrets:
#     - CLOUDFLARE_API_TOKEN
#     - CLOUDFLARE_ACCOUNT_ID

name: Deploy MkDocs

on:
  push:
    branches:
      - X
  pull_request:
    branches:
      - X
  workflow_dispatch:

# 权限设置
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制: 同一组内只允许一个部署任务运行
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ============================================================
  # 构建作业 — 一次构建，两份部署共用
  # ============================================================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build MkDocs site
        run: mkdocs build --strict
        env:
          SITE_URL: ${{ steps.pages.outputs.base_url }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  # ============================================================
  # 部署到 GitHub Pages
  # ============================================================
  deploy-github:
    if: github.event_name == 'push' && github.ref == 'refs/heads/X'
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ============================================================
  # 部署到 Cloudflare Pages (wiki.repcz.link)
  # ============================================================
  deploy-cloudflare:
    if: github.event_name == 'push' && github.ref == 'refs/heads/X'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Download built artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: site

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=repcz-tool
